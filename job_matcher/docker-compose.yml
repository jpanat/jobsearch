version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Job Matcher — Multi-Agent System
# docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  build:
    context: ..
    dockerfile: job_matcher/Dockerfile
  env_file: .env
  restart: unless-stopped
  networks:
    - job_matcher_net

services:

  # ── MCP Servers ─────────────────────────────────────────────────────────────

  linkedin_mcp:
    <<: *common
    container_name: linkedin_mcp
    command: python -m job_matcher.mcp_servers.linkedin_mcp.server
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  job_boards_mcp:
    <<: *common
    container_name: job_boards_mcp
    command: python -m job_matcher.mcp_servers.job_boards_mcp.server
    ports:
      - "9002:9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  document_mcp:
    <<: *common
    container_name: document_mcp
    command: python -m job_matcher.mcp_servers.document_mcp.server
    ports:
      - "9003:9003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  memory_mcp:
    <<: *common
    container_name: memory_mcp
    command: python -m job_matcher.mcp_servers.memory_mcp.server
    ports:
      - "9004:9004"
    volumes:
      - chroma_data:/tmp/job_matcher_chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Specialist Agents ────────────────────────────────────────────────────────

  profile_parser:
    <<: *common
    container_name: profile_parser
    command: python -m job_matcher.agents.profile_parser.agent
    ports:
      - "8001:8001"
    depends_on:
      linkedin_mcp:
        condition: service_healthy
      document_mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  job_discovery:
    <<: *common
    container_name: job_discovery
    command: python -m job_matcher.agents.job_discovery.agent
    ports:
      - "8002:8002"
    depends_on:
      job_boards_mcp:
        condition: service_healthy
      memory_mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  job_matcher_agent:
    <<: *common
    container_name: job_matcher_agent
    command: python -m job_matcher.agents.job_matcher.agent
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  resume_customizer:
    <<: *common
    container_name: resume_customizer
    command: python -m job_matcher.agents.resume_customizer.agent
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  cover_letter:
    <<: *common
    container_name: cover_letter
    command: python -m job_matcher.agents.cover_letter.agent
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gap_analysis:
    <<: *common
    container_name: gap_analysis
    command: python -m job_matcher.agents.gap_analysis.agent
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  interview_prep:
    <<: *common
    container_name: interview_prep
    command: python -m job_matcher.agents.interview_prep.agent
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit UI ─────────────────────────────────────────────────────────────

  ui:
    <<: *common
    container_name: ui
    command: streamlit run job_matcher/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      ORCHESTRATOR_URL: "http://orchestrator:8000"
    depends_on:
      orchestrator:
        condition: service_started

  # ── Orchestrator (starts last, depends on all agents) ────────────────────────

  orchestrator:
    <<: *common
    container_name: orchestrator
    command: python -m job_matcher.agents.orchestrator.agent
    ports:
      - "8000:8000"
    depends_on:
      profile_parser:
        condition: service_healthy
      job_discovery:
        condition: service_healthy
      job_matcher_agent:
        condition: service_healthy
      resume_customizer:
        condition: service_healthy
      cover_letter:
        condition: service_healthy
      gap_analysis:
        condition: service_healthy
      interview_prep:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  job_matcher_net:
    driver: bridge

volumes:
  chroma_data:
